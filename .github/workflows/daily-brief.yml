name: Daily Industry Brief

on:
  schedule:
    # 21:00 UTC = 05:00 Asia/Shanghai
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date, e.g. 2026-06-02"
        required: false
        default: ""

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily brief
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          LOOKBACK_HOURS: "24"
          MAX_ITEMS_PER_CATEGORY: "10"
          OPENAI_MAX_ARTICLES: "15"
          REPORT_DATE: ${{ github.event.inputs.report_date }}
        run: python main.py
