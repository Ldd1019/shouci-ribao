name: Daily Doubao PPT Generate

on:
  schedule:
    # 21:00 UTC = 05:00 Asia/Shanghai
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date, e.g. 2026-06-04"
        required: false
        default: ""

jobs:
  generate-ppt:
    runs-on: [self-hosted, windows, doubao-ppt]
    timeout-minutes: 90
    steps:
      - name: Generate Doubao PPT locally
        shell: cmd
        env:
          REPORT_DATE: ${{ github.event.inputs.report_date }}
          DOUBAO_LOGIN_WAIT_MS: "600000"
          DOUBAO_MAX_REVISION_ATTEMPTS: "3"
          DOUBAO_USE_DEFAULT_CHROME_PROFILE: "1"
        run: >
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "$ErrorActionPreference='Stop'; Set-Location 'D:\Codex新\Codex周报';
          & 'D:\Codex新\Codex周报\scripts\generate_doubao_ppt.ps1'"
