name: Daily Doubao PPT Email

on:
  schedule:
    # 09:00 UTC = 17:00 Asia/Shanghai
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date, e.g. 2026-06-04"
        required: false
        default: ""

jobs:
  send-email:
    runs-on: [self-hosted, windows, doubao-ppt]
    timeout-minutes: 20
    steps:
      - name: Send existing Doubao PPT
        shell: cmd
        env:
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
          REPORT_DATE: ${{ github.event.inputs.report_date }}
        run: >
          powershell -NoProfile -ExecutionPolicy Bypass -Command
          "$ErrorActionPreference='Stop'; Set-Location 'D:\Codex新\Codex周报';
          & 'D:\Codex新\Codex周报\scripts\send_doubao_ppt.ps1'"
