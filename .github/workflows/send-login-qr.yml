name: Send Doubao Login QR

on:
  workflow_dispatch:

jobs:
  send-login-qr:
    runs-on: [self-hosted, windows, doubao-ppt]
    timeout-minutes: 10
    steps:
      - name: Send Doubao login QR by email
        shell: powershell
        env:
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          LOGIN_QR_PATH: "D:\Codex新\Codex周报\outputs\2026-06-04\doubao-login-needed.png"
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location "D:\Codex新\Codex周报"
          & "C:\Users\Administrator\.cache\codex-runtimes\codex-primary-runtime\dependencies\python\python.exe" "D:\Codex新\Codex周报\scripts\send_login_qr.py"
